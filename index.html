<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTBF 測試時間預估工具 (國際標準合規版)</title>
    <style>
        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background-color: #f8fafc; color: #334155; line-height: 1.5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #0f172a; text-align: center; font-size: 1.6rem; border-bottom: 3px solid #3b82f6; padding-bottom: 15px; margin-bottom: 25px; }
        .declaration { background: #f1f5f9; border-left: 4px solid #64748b; padding: 15px; font-size: 0.85rem; margin-bottom: 25px; border-radius: 4px; }
        .section { margin-bottom: 25px; padding: 20px; border: 1px solid #e2e8f0; border-radius: 10px; background: #fff; }
        .section-title { font-weight: bold; color: #1e40af; margin-bottom: 15px; font-size: 1.05rem; display: flex; align-items: center; }
        .section-title::before { content: ""; display: inline-block; width: 4px; height: 18px; background: #3b82f6; margin-right: 10px; border-radius: 2px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: 600; font-size: 0.85rem; margin-bottom: 5px; color: #475569; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.95rem; background: #fdfdfd; }
        input:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .calc-btn { width: 100%; padding: 16px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; transition: background 0.2s; }
        .calc-btn:hover { background: #1d4ed8; }
        .result-panel { margin-top: 30px; padding: 25px; border-radius: 10px; display: none; background: #f0fdf4; border: 2px solid #22c55e; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dashed #d1fae5; padding-bottom: 5px; }
        .res-label { font-weight: 500; }
        .res-val { font-weight: bold; color: #166534; }
        .res-highlight { font-size: 1.4rem; color: #c2410c; }
        .footer { text-align: center; margin-top: 30px; font-size: 0.75rem; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <h1>MTBF 測試時間預估工具</h1>

    <div class="declaration">
        <strong>合規性宣告：</strong><br>
        本計算機係整合 <strong>IEC 61124</strong> (定時截尾法)、<strong>IEC 62506</strong> (Type B 加速模型) 與 <strong>MIL-HDBK-781A</strong> (卡方統計判定) 之國際標準原則設計 [1, 3, 4]。
    </div>

    <!-- 1. 客戶可靠度目標值 -->
    <div class="section">
        <div class="section-title">1. 客戶可靠度目標值</div>
        <div class="grid">
            <div class="input-group">
                <label>產品目標壽命 (天)</label>
                <input type="number" id="goalLifeDays" value="365">
            </div>
            <div class="input-group">
                <label>要求存活率 / 可靠度 (R)</label>
                <input type="number" id="goalR" value="0.95" step="0.001">
            </div>
        </div>
    </div>

    <!-- 2. 失效狀況與策略 -->
    <div class="section" style="background: #fdf2f2;">
        <div class="section-title">2. 失效狀況與策略</div>
        <div class="grid">
            <div class="input-group">
                <label>信心水準 (Confidence Level)</label>
                <select id="cl">
                    <option value="0.99">99% (極高可靠度需求)</option>
                    <option value="0.95" selected>95% (醫療/標準合規)</option>
                    <option value="0.90">90% (工業一般標準)</option>
                    <option value="0.60">60% (開發初步驗證)</option>
                </select>
            </div>
            <div class="input-group">
                <label>允許失效次數 (r)</label>
                <input type="number" id="failR" value="0">
            </div>
            <div class="input-group" style="grid-column: span 2;">
                <label>測試樣品數量 (Sample Size)</label>
                <input type="number" id="size" value="10">
            </div>
        </div>
    </div>

    <!-- 3. 加速條件 -->
    <div class="section" style="background: #f0f9ff;">
        <div class="section-title">3. 加速條件</div>
        <div class="grid">
            <div class="input-group">
                <label>活化能 Ea (eV)</label>
                <input type="number" id="ea" value="0.60" step="0.01">
            </div>
            <div class="input-group">
                <label>使用環境溫度 (°C)</label>
                <input type="number" id="tUse" value="25">
            </div>
            <div class="input-group">
                <label>加速測試溫度 (°C)</label>
                <input type="number" id="tTest" value="60">
            </div>
            <div class="input-group">
                <label>測試操作頻率 (Cycles/hr)</label>
                <input type="number" id="fTest" value="1">
            </div>
            <div class="input-group">
                <label>實際使用頻率 (Cycles/hr)</label>
                <input type="number" id="fUse" value="1">
            </div>
        </div>
    </div>

    <button class="calc-btn" onclick="calculate()">MTBF 測試時間預估計算</button>

    <div id="resultArea" class="result-panel">
        <div class="section-title" style="color: #166534;">量化預估分析報告</div>
        <div id="resContent"></div>
    </div>

    <div class="footer">
        技術參考：IEC 61124 (Time-terminated), IEC 62506 (Type B Acceleration) [1, 2].<br>
        波茲曼常數 k = 8.617385 × 10⁻⁵ eV/K
    </div>
</div>

<script>
    // 穩健型 Z-分數近似函數
    function getZScore(p) {
        let q = p > 0.5 ? 1 - p : p;
        let t = Math.sqrt(Math.log(1.0 / (q * q)));
        let num = 2.515517 + 0.802853 * t + 0.010328 * t * t;
        let den = 1.0 + 1.432788 * t + 0.189269 * t * t + 0.001308 * t * t * t;
        let z = t - num / den;
        return p > 0.5 ? z : -z;
    }

    // Wilson-Hilferty 卡方近似 (df = 2r + 2) [3, 5]
    function getChiSquare(cl, df) {
        const alpha = 1 - cl;
        const z = getZScore(1 - alpha);
        return df * Math.pow(1 - (2 / (9 * df)) + z * Math.sqrt(2 / (9 * df)), 3);
    }

    function calculate() {
        // 讀取數值
        const days = parseFloat(document.getElementById('goalLifeDays').value) || 0;
        const R = parseFloat(document.getElementById('goalR').value) || 0.95;
        const ea = parseFloat(document.getElementById('ea').value) || 0.60;
        const cl = parseFloat(document.getElementById('cl').value);
        const r = parseInt(document.getElementById('failR').value) || 0;
        const size = parseFloat(document.getElementById('size').value) || 1;
        const tUseK = parseFloat(document.getElementById('tUse').value) + 273.15;
        const tTestK = parseFloat(document.getElementById('tTest').value) + 273.15;
        const fTest = parseFloat(document.getElementById('fTest').value) || 1;
        const fUse = parseFloat(document.getElementById('fUse').value) || 1;

        if (days <= 0 || R <= 0 || R >= 1) {
            alert("請輸入正確的壽命天數與存活率(0~1之間)");
            return;
        }

        // 1. 自動換算目標 MTBF: R = exp(-t/MTBF) => MTBF = -t / ln(R) [6]
        const lifeHours = days * 24;
        const targetMTBF = -lifeHours / Math.log(R);

        // 2. 計算加速因子 (Combined AF) [4, 7]
        const k = 8.617385e-5;
        const AF_temp = Math.exp((ea / k) * (1 / tUseK - 1 / tTestK));
        const AF_cycle = fTest / fUse;
        const AF_total = AF_temp * AF_cycle;

        // 3. 統計係數 (Coefficient = χ²/2) [3, 4, 8]
        const df = 2 * r + 2;
        const chi2 = getChiSquare(cl, df);
        const coeff = chi2 / 2;

        // 4. 計算所需測試時數 [4]
        // 目標 MTBF = (累積台時 * AF_Total) / Coeff
        // 累積台時 = (TargetMTBF * Coeff) / AF_Total
        const totalEqHoursNeeded = targetMTBF * coeff; // 這是現場等效總台時
        const unitTestHours = totalEqHoursNeeded / (size * AF_total);

        // 顯示結果
        let html = `
            <div class="res-row"><span class="res-label">自動換算目標 MTBF：</span><span class="res-val">${Math.round(targetMTBF).toLocaleString()} 小時</span></div>
            <div class="res-row"><span class="res-label">總加速因子 (AF_Total)：</span><span class="res-val">${AF_total.toFixed(2)} 倍 (熱: ${AF_temp.toFixed(2)} / 事件: ${AF_cycle.toFixed(2)})</span></div>
            <div class="res-row"><span class="res-label">卡方分布數值 χ²：</span><span class="res-val">${chi2.toFixed(3)} (自由度 ${df})</span></div>
            <div class="res-row"><span class="res-label">所需累積等效總台時：</span><span class="res-val">${Math.round(totalEqHoursNeeded).toLocaleString()} 小時</span></div>
            <hr style="border:0; border-top:1px solid #d1fae5; margin:15px 0;">
            <div class="res-row" style="border:none;"><span class="res-label" style="font-size:1.1rem; color:#c2410c;">每台機器實際測試需跑：</span><span class="res-highlight">${Math.round(unitTestHours).toLocaleString()} 小時</span></div>
            <div class="res-row" style="border:none;"><span class="res-label">預估測試總時程：</span><span class="res-val">${(unitTestHours / 24).toFixed(1)} 天 (24hr 連續運行)</span></div>
        `;

        document.getElementById('resContent').innerHTML = html;
        document.getElementById('resultArea').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
