<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>MTBF 國際標準量化驗證工具 (修正版)</title>
    <style>
        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; padding: 25px; color: #333; }
        .container { max-width: 950px; margin: 0 auto; background: #fff; padding: 35px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid #2980b9; margin-bottom: 25px; padding-bottom: 10px; }
        .declaration { background: #fdf2e9; border-left: 5px solid #e67e22; padding: 15px; font-size: 0.9rem; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .section-title { grid-column: span 2; font-weight: bold; color: #2c3e50; background: #eee; padding: 8px 15px; border-radius: 5px; margin-top: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
        .calc-btn { grid-column: span 2; padding: 18px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .result-panel { margin-top: 30px; padding: 25px; border-radius: 10px; display: none; background: #ebf5fb; border: 2px solid #3498db; }
        .res-val { font-size: 1.8rem; font-weight: bold; color: #e67e22; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>MTBF 國際標準量化驗證工具</h2>
    </div>

    <div class="declaration">
        <strong>合規性宣告：</strong><br>
        本計算機係整合 <strong>IEC 61124</strong> (定時截尾法)、<strong>IEC 62506</strong> (Type B 加速模型) 與 <strong>MIL-HDBK-781A</strong> (卡方統計判定) 原則設計，旨在提供符合合規性要求之 MTBF 量化驗證結果。
    </div>

    <div class="grid">
        <div class="section-title">步驟 1：可靠度目標設定 (R(t)=e⁻⁽ᵗ/ᴹᵀᴮᶠ⁾)</div>
        <div class="input-group">
            <label>產品目標壽命 (小時)</label>
            <input type="number" id="goalLife" value="8760" oninput="syncTarget()">
        </div>
        <div class="input-group">
            <label>存活率目標 (R) <small>(例：0.99 代表 99%)</small></label>
            <input type="number" id="goalR" value="0.99" step="0.001" oninput="syncTarget()">
        </div>
        <div class="input-group" style="grid-column: span 2; color: #d35400; font-weight: bold; padding: 10px; background: #fff9f0; border-radius: 5px;">
            自動換算之目標 MTBF： <span id="targetDisplay">871,642</span> 小時
        </div>

        <div class="section-title">步驟 2：測試環境與統計參數設定</div>
        <div class="input-group">
            <label>信心水準 (Confidence Level)</label>
            <select id="cl">
                <option value="0.99">99% (極高可靠度需求)</option>
                <option value="0.95">95% (醫療器材/航太標準)</option>
                <option value="0.90" selected>90% (工業合規標準)</option>
                <option value="0.60">60% (一般商規初步驗證)</option>
            </select>
        </div>
        <div class="input-group">
            <label>失效次數 r (預期或實際發生)</label>
            <input type="number" id="failR" value="0">
        </div>
        <div class="input-group">
            <label>活化能 Ea (eV) <small>(醫療建議 0.5, 電子建議 0.7)</small></label>
            <input type="number" id="ea" value="0.70" step="0.01">
        </div>
        <div class="input-group">
            <label>測試樣品數量 (Size)</label>
            <input type="number" id="size" value="10">
        </div>
        <div class="input-group">
            <label>使用溫度 (°C) / 加速測試溫度 (°C)</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="tUse" value="25" style="width:50%;">
                <input type="number" id="tTest" value="60" style="width:50%;">
            </div>
        </div>
        <div class="input-group">
            <label>事件頻率: 使用 / 測試 (Cycles/hr)</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="fUse" value="1" style="width:50%;">
                <input type="number" id="fTest" value="1" style="width:50%;">
            </div>
        </div>

        <button class="calc-btn" onclick="calculate()">執行自動化量化驗證計算</button>
    </div>

    <div id="resultArea" class="result-panel"></div>
</div>

<script>
    function syncTarget() {
        const t = parseFloat(document.getElementById('goalLife').value) || 0;
        const r = parseFloat(document.getElementById('goalR').value) || 0;
        if (t > 0 && r > 0 && r < 1) {
            // R = exp(-t/MTBF) => MTBF = -t / ln(R)
            const mtbf = -t / Math.log(r);
            document.getElementById('targetDisplay').innerText = Math.round(mtbf).toLocaleString();
            return mtbf;
        }
        return 0;
    }

    // 修正後的 Z-分數近似計算函數 (Rational Approximation)
    function getZScore(p) {
        const c0 = 2.515517, c1 = 0.802853, c2 = 0.010328;
        const d1 = 1.432788, d2 = 0.189269, d3 = 0.001308;
        
        let q = p > 0.5 ? 1 - p : p;
        if (q <= 0) return 0;
        
        let t = Math.sqrt(-2 * Math.log(q));
        // 使用多項式修正語法
        let res = t - (c0 + c1 * t + c2 * t * t) / (1 + d1 * t + d2 * t * t + d3 * t * t * t);
        
        return p > 0.5 ? res : -res;
    }

    // Wilson-Hilferty 近似算法：精確計算卡方值
    function getChiSquare(cl, df) {
        const alpha = 1 - cl;
        const z = getZScore(1 - alpha);
        // 公式：df * (1 - 2/(9*df) + z * sqrt(2/(9*df)))^3
        return df * Math.pow(1 - 2/(9*df) + z * Math.sqrt(2/(9*df)), 3);
    }

    function calculate() {
        const targetMTBF = syncTarget();
        if (targetMTBF <= 0) {
            alert("請輸入正確的目標壽命與存活率(0~1之間)");
            return;
        }

        const ea = parseFloat(document.getElementById('ea').value) || 0.7;
        const cl = parseFloat(document.getElementById('cl').value);
        const r = parseInt(document.getElementById('failR').value) || 0;
        const size = parseFloat(document.getElementById('size').value) || 1;
        const tUseK = parseFloat(document.getElementById('tUse').value) + 273.15;
        const tTestK = parseFloat(document.getElementById('tTest').value) + 273.15;
        const fUse = parseFloat(document.getElementById('fUse').value) || 1;
        const fTest = parseFloat(document.getElementById('fTest').value) || 1;

        // 1. 計算總加速因子 (Combined Acceleration Factor)
        const k = 8.617385e-5; // 波茲曼常數
        const AF_temp = Math.exp((ea / k) * (1 / tUseK - 1 / tTestK));
        const AF_cycle = fTest / fUse;
        const AF_total = AF_temp * AF_cycle;

        // 2. 統計係數計算 (Coefficient = χ²/2)
        const df = 2 * r + 2; // 定時截尾測試自由度 [4]
        const chi2 = getChiSquare(cl, df);
        const coefficient = chi2 / 2;

        // 3. 測試時長規劃
        // 目標 MTBF = (總等效時數) / (χ²/2)
        // 總等效時數 = TargetMTBF * Coefficient
        const totalEqHoursNeeded = targetMTBF * coefficient;
        const unitTestHours = totalEqHoursNeeded / (size * AF_total);

        let html = `<h3>量化驗證分析結果</h3>`;
        html += `<p>帶入卡方分布數值 χ²(${1-cl}, ${df}): <strong>${chi2.toFixed(4)}</strong></p>`;
        html += `<p>總加速因子 (AF_Total): <strong>${AF_total.toFixed(2)}</strong> 倍 (熱: ${AF_temp.toFixed(2)} / 事件: ${AF_cycle.toFixed(2)})</p>`;
        html += `<hr style="border: 0; border-top: 1px solid #ccc;">`;
        html += `<p>欲證明目標 MTBF，現場等效運行時數需累積達: <strong>${Math.round(totalEqHoursNeeded).toLocaleString()}</strong> 小時</p>`;
        html += `<p class="res-val">每台機器實際測試需跑: ${Math.round(unitTestHours).toLocaleString()} 小時</p>`;
        html += `<p>預估測試總時程: <strong>${(unitTestHours/24).toFixed(1)}</strong> 天 (基於 24hr 連續運行)</p>`;

        const panel = document.getElementById('resultArea');
        panel.innerHTML = html;
        panel.style.display = 'block';
    }

    // 初始化同步一次顯示
    syncTarget();
</script>

</body>
</html>
